<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEAM Flash Lab — I.T.S. Santa Rosa de Lima</title>
<script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #040609;
  --surf:     rgba(8,14,28,0.9);
  --card:     rgba(10,16,32,0.7);
  --gold:     #e8a020;
  --gold-d:   rgba(232,160,32,0.12);
  --gold-b:   rgba(232,160,32,0.25);
  --blue:     #1a8fff;
  --blue-d:   rgba(26,143,255,0.08);
  --green:    #4ade80;
  --red:      #f87171;
  --txt:      #dce8f5;
  --txt2:     #7a90b0;
  --txt3:     #3d4f6a;
  --bdr:      rgba(232,160,32,0.1);
  --bdr-h:    rgba(232,160,32,0.35);
  --sbw:      210px;
  --hdrh:     62px;
  --tbarh:    30px;
  --Rd:       'Rajdhani', sans-serif;
  --Jm:       'JetBrains Mono', monospace;
  --Ex:       'Exo 2', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--Ex);
  background: var(--bg);
  color: var(--txt);
  display: grid;
  grid-template-rows: var(--hdrh) 1fr var(--tbarh);
  grid-template-columns: var(--sbw) 1fr;
  grid-template-areas: "hdr hdr" "sb main" "tbar tbar";
}

/* ── Grid background ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(26,143,255,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,143,255,0.022) 1px, transparent 1px);
  background-size: 46px 46px;
}

/* ════════════════════════════════
   HEADER
════════════════════════════════ */
header {
  grid-area: hdr;
  display: flex; align-items: center;
  padding: 0 18px; gap: 13px;
  border-bottom: 1px solid var(--bdr);
  background: rgba(4,6,9,0.98);
  backdrop-filter: blur(20px);
  position: relative; z-index: 50;
}

/* Logo con anillos orbitales */
.logo-wrap {
  position: relative;
  width: 38px; height: 38px;
  flex-shrink: 0;
}
.logo-img {
  width: 38px; height: 38px;
  border-radius: 50%;
  object-fit: contain;
  position: relative; z-index: 2;
  filter: drop-shadow(0 0 5px var(--gold));
  animation: lgPulse 4s ease-in-out infinite;
}
.ring {
  position: absolute; border-radius: 50%;
  border: 1.5px solid transparent;
}
.ring-1 {
  inset: -5px;
  border-top-color: var(--gold);
  border-right-color: rgba(232,160,32,0.3);
  animation: spin 3.5s linear infinite;
}
.ring-2 {
  inset: -11px;
  border: 1px solid transparent;
  border-bottom-color: var(--blue);
  border-left-color: rgba(26,143,255,0.25);
  animation: spin 6.5s linear infinite reverse;
}
@keyframes lgPulse {
  0%,100%{ filter: drop-shadow(0 0 4px var(--gold)); }
  50%    { filter: drop-shadow(0 0 16px var(--gold)) drop-shadow(0 0 30px rgba(232,160,32,.2)); }
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Título header */
.hdr-text { flex: 1; min-width: 0; }
.hdr-text h1 {
  font-family: var(--Rd);
  font-size: 1.05rem; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  line-height: 1; color: var(--txt); white-space: nowrap;
}
.hdr-text small {
  font-family: var(--Jm);
  font-size: 0.56rem; color: var(--txt2);
  letter-spacing: 1px; display: block; margin-top: 3px;
}

/* Estado del sistema */
.sys-status {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--Jm);
  font-size: 0.58rem; color: var(--txt2);
  letter-spacing: 1px; white-space: nowrap;
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: dBlink 2.5s ease-in-out infinite;
}
@keyframes dBlink { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* ── Player de música ── */
.music-player {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 12px;
  background: rgba(232,160,32,.05);
  border: 1px solid var(--bdr);
  border-radius: 7px;
}
.music-btn {
  background: none; border: none;
  color: var(--txt2); cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  transition: color .2s;
}
.music-btn:hover, .music-btn.on { color: var(--gold); }
.music-btn svg { width: 14px; height: 14px; fill: currentColor; }

/* Waveform */
.waveform {
  display: flex; align-items: center; gap: 2px; height: 18px;
}
.wb {
  width: 3px; border-radius: 1.5px;
  background: var(--gold); opacity: .28;
  animation: wv var(--d,1s) ease-in-out infinite var(--dl,0s);
  animation-play-state: paused;
  height: 3px;
}
.waveform.playing .wb {
  opacity: .75;
  animation-play-state: running;
}
@keyframes wv { 0%,100%{height:3px;} 50%{height:var(--h,14px);} }

/* ════════════════════════════════
   SIDEBAR
════════════════════════════════ */
.sidebar {
  grid-area: sb;
  border-right: 1px solid var(--bdr);
  background: rgba(4,6,9,0.92);
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  position: relative; z-index: 10;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px; }

.sb-label {
  font-family: var(--Jm);
  font-size: 0.54rem; letter-spacing: 2.5px;
  color: var(--txt3); text-transform: uppercase;
  padding: 18px 14px 8px;
}

.gb {
  width: 100%; background: none; border: none;
  border-left: 2px solid transparent;
  padding: 9px 14px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; text-align: left;
  transition: all .18s ease;
}
.gb:hover   { background: var(--gold-d); border-left-color: rgba(232,160,32,.3); }
.gb.active  { background: rgba(232,160,32,.08); border-left-color: var(--gold); }

.gb-num {
  font-family: var(--Rd); font-weight: 700;
  font-size: 1.05rem; color: var(--gold);
  line-height: 1; min-width: 24px;
}
.gb.active .gb-num { text-shadow: 0 0 12px var(--gold); }

.gb-info { display: flex; flex-direction: column; }
.gb-name {
  font-family: var(--Ex); font-size: .7rem; font-weight: 600;
  color: var(--txt2); transition: color .18s;
}
.gb.active .gb-name { color: var(--gold); }
.gb-sub {
  font-family: var(--Jm); font-size: .54rem;
  color: var(--txt3); margin-top: 1px;
}

.sb-divider { height: 1px; background: var(--bdr); margin: 4px 14px; }

/* ════════════════════════════════
   MAIN
════════════════════════════════ */
.main {
  grid-area: main;
  overflow-y: auto; overflow-x: hidden;
  padding: 22px 22px 16px;
  position: relative; z-index: 10;
}
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px; }

/* Vista por grado */
.gv { display: none; }
.gv.active { display: block; }

/* Encabezado del grado */
.gv-hdr { margin-bottom: 20px; }
.gv-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 12px; margin-bottom: 5px;
}
.gv-title {
  font-family: var(--Rd); font-size: 1.85rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; line-height: 1;
}
.gv-title em { color: var(--gold); font-style: normal; }
.gv-desc {
  font-family: var(--Ex); font-size: .78rem;
  color: var(--txt2); font-weight: 300; font-style: italic;
  margin-top: 4px;
}
.gv-badge {
  font-family: var(--Jm); font-size: .58rem;
  color: var(--gold); padding: 3px 9px;
  background: var(--gold-d); border: 1px solid var(--gold-b);
  border-radius: 4px; white-space: nowrap;
}
.gv-line {
  height: 1px; margin-top: 12px;
  background: linear-gradient(90deg, var(--gold-b), rgba(232,160,32,.04), transparent);
}

/* Grid de tarjetas */
.pgrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 13px;
}

/* ── Tarjeta de proyecto ── */
.pc {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 9px; padding: 17px;
  display: flex; flex-direction: column; gap: 11px;
  transition: all .22s ease;
  backdrop-filter: blur(10px);
  position: relative; overflow: hidden;
}
.pc::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0; transition: opacity .3s;
}
.pc:hover:not(.coming) {
  border-color: var(--bdr-h);
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(0,0,0,.5), 0 0 22px rgba(232,160,32,.04);
}
.pc:hover::after { opacity: 1; }
.pc.coming { opacity: .42; border-style: dashed; }

.pc-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 8px;
}
.pc-icon {
  width: 33px; height: 33px;
  background: var(--gold-d);
  border: 1px solid var(--gold-b);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.pc-icon svg { width: 17px; height: 17px; stroke: var(--gold); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* Badges */
.bdg {
  font-family: var(--Jm); font-size: .56rem;
  letter-spacing: 1px; padding: 3px 7px;
  border-radius: 3px; white-space: nowrap;
}
.bdg-esp { background: var(--blue-d); color: var(--blue); border: 1px solid rgba(26,143,255,.2); }
.bdg-new { background: rgba(74,222,128,.07); color: var(--green); border: 1px solid rgba(74,222,128,.2); }
.bdg-soon{ background: var(--gold-d); color: var(--gold); border: 1px dashed var(--gold-b); }

.pc-title {
  font-family: var(--Rd); font-size: .92rem; font-weight: 600;
  letter-spacing: .5px; color: var(--txt); line-height: 1.3;
}
.pc-desc {
  font-family: var(--Ex); font-size: .73rem;
  color: var(--txt2); line-height: 1.56; font-weight: 300; flex: 1;
}
.pc-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.ptag {
  font-family: var(--Jm); font-size: .54rem;
  padding: 2px 6px; border-radius: 3px;
  background: rgba(255,255,255,.03);
  color: var(--txt3); border: 1px solid rgba(255,255,255,.05);
}

/* Footer de tarjeta */
.pc-footer {
  border-top: 1px solid var(--bdr); padding-top: 12px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}

/* Botón de flasheo (solo para proyectos sin esp-web-install-button) */
.btn-flash {
  font-family: var(--Rd); font-size: .74rem;
  font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  padding: 6px 14px;
  background: transparent; color: var(--gold);
  border: 1px solid var(--gold); border-radius: 5px;
  cursor: pointer; transition: all .2s ease;
  display: flex; align-items: center; gap: 5px;
}
.btn-flash:hover {
  background: var(--gold); color: var(--bg);
  box-shadow: 0 0 18px rgba(232,160,32,.25);
}
.btn-flash svg { width: 12px; height: 12px; fill: currentColor; }

.txt-coming {
  font-family: var(--Jm); font-size: .58rem;
  color: var(--txt3); letter-spacing: 1px;
}
.txt-fw {
  font-family: var(--Jm); font-size: .56rem;
  color: var(--txt3); letter-spacing: .4px;
}

/* ── Estilos del botón nativo de esp-web-tools ── */
esp-web-install-button {
  --esp-tools-button-color: #e8a020;
  --esp-tools-button-text-color: #040609;
}

/* ════════════════════════════════
   TERMINAL BAR
════════════════════════════════ */
.tbar {
  grid-area: tbar;
  border-top: 1px solid var(--bdr);
  background: rgba(4,6,9,.98);
  display: flex; align-items: center;
  padding: 0 14px; gap: 9px;
  font-family: var(--Jm); font-size: .6rem; color: var(--txt3);
  position: relative; z-index: 50;
}
.tbar-prompt { color: var(--gold); }
.tbar-msg    { color: var(--txt2); }
.tbar-cur {
  width: 5px; height: 10px;
  background: var(--gold);
  animation: cur 1s step-end infinite;
}
@keyframes cur { 0%,100%{opacity:1;} 50%{opacity:0;} }
.tbar-r { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.tbar-stat { display: flex; align-items: center; gap: 4px; color: var(--txt3); }
.tbar-stat span:last-child { color: var(--txt2); }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="logo-wrap">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <img src="logo.png" alt="I.T.S. Santa Rosa de Lima" class="logo-img">
  </div>
  <div class="hdr-text">
    <h1>STEAM Flash Lab</h1>
    <small>I.T.S. SANTA ROSA DE LIMA — ROBÓTICA &amp; SISTEMAS</small>
  </div>
  <div class="sys-status">
    <div class="dot"></div>
    <span>SISTEMA ACTIVO</span>
  </div>
  <div class="music-player">
    <button class="music-btn" id="musicBtn" title="Reproducir / Pausar música">
      <!-- Ícono Play -->
      <svg id="icoPlay" viewBox="0 0 16 16"><path d="M4 2 14 8 4 14z"/></svg>
      <!-- Ícono Pause (oculto) -->
      <svg id="icoPause" viewBox="0 0 16 16" style="display:none">
        <rect x="3" y="2" width="3.5" height="12" rx="1"/>
        <rect x="9.5" y="2" width="3.5" height="12" rx="1"/>
      </svg>
    </button>
    <div class="waveform" id="waveform">
      <div class="wb" style="--d:.72s;--dl:0s;--h:15px;"></div>
      <div class="wb" style="--d:1.1s;--dl:.14s;--h:9px;"></div>
      <div class="wb" style="--d:.86s;--dl:.28s;--h:17px;"></div>
      <div class="wb" style="--d:.95s;--dl:.07s;--h:8px;"></div>
      <div class="wb" style="--d:1.25s;--dl:.42s;--h:13px;"></div>
      <div class="wb" style="--d:.78s;--dl:.21s;--h:16px;"></div>
      <div class="wb" style="--d:1.05s;--dl:.35s;--h:11px;"></div>
    </div>
  </div>
</header>

<!-- ══ SIDEBAR ══ -->
<nav class="sidebar" id="sidebar">
  <div class="sb-label">Grados académicos</div>
  <!-- Generado por JS -->
</nav>

<!-- ══ MAIN ══ -->
<main class="main" id="main">
  <!-- Generado por JS -->
</main>

<!-- ══ TERMINAL BAR ══ -->
<div class="tbar">
  <span class="tbar-prompt">steam@lab:~$</span>
  <span class="tbar-msg" id="tbarMsg">Sistema listo. Selecciona un grado para comenzar.</span>
  <div class="tbar-cur"></div>
  <div class="tbar-r">
    <div class="tbar-stat"><span>GRADO</span><span id="tbarGrade">—</span></div>
    <div class="tbar-stat"><span>PROYECTOS</span><span id="tbarCount">—</span></div>
    <div class="tbar-stat"><span>ESP32</span><span style="color:var(--green)">LISTO</span></div>
  </div>
</div>

<!-- ══ AUDIO ══ -->
<audio id="bgAudio" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
/* ════════════════════════════════════
   ÍCONOS SVG POR TIPO DE PROYECTO
════════════════════════════════════ */
const ICONS = {
  led:       `<svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="14" x2="12" y2="22"/><line x1="4" y1="10" x2="8" y2="10"/><line x1="16" y1="10" x2="20" y2="10"/><line x1="6" y1="4" x2="9" y2="7"/><line x1="18" y1="4" x2="15" y2="7"/></svg>`,
  circuit:   `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="6" height="6" rx="1"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><circle cx="3" cy="12" r="1.5"/><circle cx="21" cy="12" r="1.5"/></svg>`,

  iot:       `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.5"/><path d="M6.3 6.3a8 8 0 000 11.4"/><path d="M17.7 6.3a8 8 0 010 11.4"/><path d="M3.5 3.5a14 14 0 000 17"/><path d="M20.5 3.5a14 14 0 010 17"/></svg>`,
  arm:       `<svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="8" y2="14"/><line x1="8" y1="14" x2="14" y2="8"/><line x1="14" y1="8" x2="19" y2="5"/><circle cx="8"  cy="14" r="2"/><circle cx="14" cy="8"  r="2"/><circle cx="19" cy="5"  r="2"/></svg>`,
  relay:     `<svg viewBox="0 0 24 24"><rect x="6" y="10" width="12" height="7" rx="2"/><path d="M6 14H3M18 14h3"/><circle cx="6" cy="8" r="1.5"/><line x1="6" y1="8" x2="6" y2="10"/><line x1="10" y1="13.5" x2="14" y2="13.5"/></svg>`,

/* ════════════════════════════════════
   DATOS DE PROYECTOS POR GRADO
════════════════════════════════════ */
const DATA = {
  5: {
    name: "Quinto Grado",
    desc: "Primeros pasos en electrónica — LEDs, semáforos y lógica básica",

/* ════════════════════════════════════
   RENDERIZADO
════════════════════════════════════ */
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  const label = sb.querySelector('.sb-label');
  let html = '';
  const grades = Object.keys(DATA).sort((a,b) => +a - +b);

  grades.forEach((g, i) => {
    const d = DATA[g];
    const active = d.projects.filter(p => p.status === 'active').length;
    const total  = d.projects.length;
    const isCurrent = +g === 11;
    html += `
    <button class="gb${isCurrent?' active':''}" data-grade="${g}" onclick="selectGrade(${g})">
      <span class="gb-num">${g}°</span>
      <span class="gb-info">
        <span class="gb-name">${d.name.replace(' Grado','')}</span>
        <span class="gb-sub">${active}/${total} disponibles</span>
      </span>
    </button>`;
    if (i < grades.length - 1) html += '<div class="sb-divider"></div>';
  });

  label.insertAdjacentHTML('afterend', html);
}

function buildMain() {
  const main = document.getElementById('main');
  let html = '';

  Object.entries(DATA).forEach(([g, d]) => {
    const activeN = d.projects.filter(p => p.status === 'active').length;
    const totalN  = d.projects.length;
    const isActive = +g === 11;

    html += `<div class="gv${isActive?' active':''}" id="gv-${g}">
      <div class="gv-hdr">
        <div class="gv-top">
          <div>
            <div class="gv-title">Grado <em>${g}°</em></div>
            <div class="gv-desc">${d.desc}</div>
          </div>
          <span class="gv-badge">${activeN}/${totalN} activos</span>
        </div>
        <div class="gv-line"></div>
      </div>
      <div class="pgrid">`;

    d.projects.forEach(p => {
      const isLive = p.status === 'active';
      const badgeClass = p.isNew ? 'bdg-new' : (isLive ? 'bdg-esp' : 'bdg-soon');
      const badgeText  = p.isNew ? 'NUEVO' : (isLive ? 'ESP32' : 'PRÓXIMO');

      html += `
      <div class="pc${!isLive?' coming':''}">
        <div class="pc-top">
          <div class="pc-icon">${ICONS[p.icon]||ICONS.circuit}</div>
          <span class="bdg ${badgeClass}">${badgeText}</span>
        </div>
        <div class="pc-title">${p.title}</div>
        <div class="pc-desc">${p.desc}</div>
        <div class="pc-tags">${p.tags.map(t=>`<span class="ptag">${t}</span>`).join('')}</div>
        <div class="pc-footer">
          ${isLive
            ? `<esp-web-install-button manifest="${p.manifest}"></esp-web-install-button>
               <span class="txt-fw">${p.fw}</span>`
            : `<span class="txt-coming">Firmware en desarrollo</span>
               <span class="txt-fw">${p.fw}</span>`
          }
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  main.innerHTML = html;
}

function selectGrade(g) {
  // Botones sidebar
  document.querySelectorAll('.gb').forEach(b => {
    b.classList.toggle('active', +b.dataset.grade === +g);
  });
  // Vistas
  document.querySelectorAll('.gv').forEach(v => {
    v.classList.toggle('active', v.id === `gv-${g}`);
  });
  // Terminal bar
  const d = DATA[g];
  const active = d.projects.filter(p=>p.status==='active').length;
  const total  = d.projects.length;
  document.getElementById('tbarMsg').textContent =
    `Mostrando ${d.name} — ${active} firmware(s) disponible(s) para flasheo.`;
  document.getElementById('tbarGrade').textContent = `${g}°`;
  document.getElementById('tbarCount').textContent = `${active}/${total}`;
}

/* ════════════════════════════════════
   PLAYER DE MÚSICA
════════════════════════════════════ */
const audio    = document.getElementById('bgAudio');
const musicBtn = document.getElementById('musicBtn');
const icoPlay  = document.getElementById('icoPlay');
const icoPause = document.getElementById('icoPause');
const waveform = document.getElementById('waveform');
let playing = false;

musicBtn.addEventListener('click', () => {
  if (playing) {
    audio.pause();
    icoPlay.style.display  = '';
    icoPause.style.display = 'none';
    musicBtn.classList.remove('on');
    waveform.classList.remove('playing');
  } else {
    audio.play()
      .then(() => {
        icoPlay.style.display  = 'none';
        icoPause.style.display = '';
        musicBtn.classList.add('on');
        waveform.classList.add('playing');
      })
      .catch(() => {
        // El navegador bloqueó el autoplay; el usuario debe hacer clic
      });
  }
  playing = !playing;
});

/* ════════════════════════════════════
   INICIO
════════════════════════════════════ */
buildSidebar();
buildMain();
selectGrade(11); // Grado 11° activo por defecto
</script>
