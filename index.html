<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NERV · STEAM LAB — I.T.S. Santa Rosa de Lima</title>
<script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   VARIABLES — EVA UNIT-01 PALETTE
══════════════════════════════════════════ */
:root {
  --bg:      #030008;
  --card:    rgba(8,2,22,0.90);
  --purp:    #7C3AED;
  --purp-b:  rgba(124,58,237,0.32);
  --purp-d:  rgba(124,58,237,0.10);
  --purp-hi: #A78BFA;
  --lime:    #84CC16;
  --lime-b:  rgba(132,204,22,0.35);
  --lime-d:  rgba(132,204,22,0.09);
  --lime-hi: #BEF264;
  --org:     #EA580C;
  --org-b:   rgba(234,88,12,0.38);
  --org-d:   rgba(234,88,12,0.10);
  --org-hi:  #FB923C;
  --txt:     #EDE9F8;
  --txt2:    #9B7DC0;
  --txt3:    #4A2D70;
  --bdr:     rgba(124,58,237,0.18);
  --sbw:     220px;
  --hh:      66px;
  --tbh:     30px;
  --Or: 'Orbitron', sans-serif;
  --Jm: 'Share Tech Mono', monospace;
  --Ex: 'Exo 2', sans-serif;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; overflow:hidden; }
body {
  font-family:var(--Ex);
  background:var(--bg); color:var(--txt);
  display:grid;
  grid-template-rows:var(--hh) 1fr var(--tbh);
  grid-template-columns:var(--sbw) 1fr;
  grid-template-areas:"hdr hdr" "sb main" "tbar tbar";
}
/* CRT scan lines */
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.10) 2px,rgba(0,0,0,.10) 4px);
}
/* Double grid */
body::after {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(124,58,237,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(124,58,237,.05) 1px,transparent 1px),
    linear-gradient(rgba(124,58,237,.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(124,58,237,.022) 1px,transparent 1px);
  background-size:80px 80px,80px 80px,20px 20px,20px 20px;
}

/* ══ HEADER ══ */
header {
  grid-area:hdr; display:flex; align-items:center;
  padding:0 18px; gap:14px;
  background:rgba(3,0,8,.99);
  border-bottom:1px solid var(--purp-b);
  position:relative; z-index:50;
}
header::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--purp-hi) 20%,var(--lime) 50%,var(--org) 80%,transparent);
  opacity:.6;
}
header::after {
  content:''; position:absolute; bottom:0; left:var(--sbw); right:0; height:1px;
  background:linear-gradient(90deg,var(--lime),transparent); opacity:.3;
}
/* Logo orbital */
.logo-wrap { position:relative; width:40px; height:40px; flex-shrink:0; }
.logo-img  { width:40px; height:40px; border-radius:50%; object-fit:contain; position:relative; z-index:2; animation:lgP 4s ease-in-out infinite; }
.ring { position:absolute; border-radius:50%; border-style:solid; border-color:transparent; }
.ring-1 { inset:-5px; border-width:1.5px; border-top-color:var(--lime); border-right-color:rgba(132,204,22,.25); animation:spin 3.5s linear infinite; }
.ring-2 { inset:-11px; border-width:1px; border-bottom-color:var(--purp-hi); border-left-color:rgba(167,139,250,.3); animation:spin 7s linear infinite reverse; }
@keyframes lgP { 0%,100%{filter:drop-shadow(0 0 4px var(--lime))} 50%{filter:drop-shadow(0 0 14px var(--lime)) drop-shadow(0 0 26px rgba(132,204,22,.3))} }
@keyframes spin { to { transform:rotate(360deg); } }
.hdr-text { flex:1; min-width:0; }
.hdr-brand { font-family:var(--Or); font-size:1rem; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:var(--txt); line-height:1; }
.hdr-brand em { color:var(--lime); font-style:normal; }
.hdr-sub { font-family:var(--Jm); font-size:.53rem; color:var(--txt3); letter-spacing:2px; display:block; margin-top:3px; }
.nerv-badge { font-family:var(--Jm); font-size:.52rem; letter-spacing:2px; padding:3px 8px; border-radius:2px; background:var(--org-d); color:var(--org-hi); border:1px solid var(--org-b); white-space:nowrap; flex-shrink:0; }
.sys-col { display:flex; flex-direction:column; gap:4px; flex-shrink:0; }
.sys-row { display:flex; align-items:center; gap:10px; }
.sys-item { display:flex; align-items:center; gap:5px; font-family:var(--Jm); font-size:.53rem; color:var(--txt2); letter-spacing:1px; }
.dot { width:6px; height:6px; border-radius:50%; }
.dot-lime { background:var(--lime); box-shadow:0 0 6px var(--lime); animation:bDot 2.5s ease-in-out infinite; }
.dot-purp { background:var(--purp-hi); box-shadow:0 0 6px var(--purp-hi); animation:bDot 3.2s ease-in-out infinite .5s; }
@keyframes bDot { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── Music player — versión Phase 4 con volumen ── */
.music-player {
  display:flex; align-items:center; gap:8px;
  padding:5px 11px;
  background:var(--purp-d); border:1px solid var(--purp-b); border-radius:3px;
  flex-shrink:0;
}
.mbtn {
  background:none; border:none; color:var(--txt2); cursor:pointer;
  width:20px; height:20px; display:flex; align-items:center; justify-content:center;
  transition:color .2s; padding:0;
}
.mbtn:hover, .mbtn.on { color:var(--lime); }
.mbtn svg { width:12px; height:12px; fill:currentColor; }
.waveform { display:flex; align-items:center; gap:2px; height:16px; }
.wb { width:3px; height:3px; border-radius:1.5px; background:var(--lime); opacity:.2; animation:wv var(--d,1s) ease-in-out infinite var(--dl,0s); animation-play-state:paused; }
.waveform.on .wb { opacity:.7; animation-play-state:running; }
@keyframes wv { 0%,100%{height:3px} 50%{height:var(--h,14px)} }
/* Slider de volumen */
.vol-wrap { display:flex; align-items:center; gap:6px; }
.vol-icon { opacity:.4; transition:opacity .2s; }
.music-player:hover .vol-icon { opacity:.7; }
.vol-icon svg { width:10px; height:10px; fill:var(--txt2); display:block; }
input[type=range].vol-slider {
  -webkit-appearance:none; appearance:none;
  width:56px; height:3px; border-radius:2px;
  background:linear-gradient(90deg,var(--lime) var(--pct,70%),rgba(255,255,255,.1) var(--pct,70%));
  outline:none; cursor:pointer;
}
input[type=range].vol-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:9px; height:9px; border-radius:50%;
  background:var(--lime); box-shadow:0 0 5px rgba(132,204,22,.5);
}

/* ══ SIDEBAR ══ */
.sidebar {
  grid-area:sb; border-right:1px solid var(--bdr);
  background:rgba(3,0,8,.96);
  display:flex; flex-direction:column;
  overflow-y:auto; overflow-x:hidden; position:relative; z-index:10;
}
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:var(--purp-b); border-radius:2px; }
.sb-stripe { height:3px; background:repeating-linear-gradient(90deg,var(--org) 0,var(--org) 8px,transparent 8px,transparent 16px); opacity:.3; }
.sb-label { font-family:var(--Jm); font-size:.52rem; letter-spacing:2.5px; color:var(--txt3); text-transform:uppercase; padding:14px 13px 7px; display:flex; align-items:center; }
.sb-label::after { content:'作戦'; font-size:.5rem; color:var(--purp); opacity:.45; margin-left:auto; }
.gb { width:100%; background:none; border:none; border-left:2px solid transparent; padding:9px 13px; display:flex; align-items:center; gap:10px; cursor:pointer; text-align:left; transition:all .18s ease; }
.gb:hover { background:var(--purp-d); border-left-color:rgba(124,58,237,.45); }
.gb.active { background:rgba(124,58,237,.10); border-left-color:var(--lime); }
.gb-num { font-family:var(--Or); font-weight:700; font-size:.95rem; color:var(--purp-hi); line-height:1; min-width:22px; flex-shrink:0; }
.gb.active .gb-num { color:var(--lime); text-shadow:0 0 10px var(--lime); }
.gb-info { display:flex; flex-direction:column; flex:1; min-width:0; }
.gb-name { font-family:var(--Ex); font-size:.68rem; font-weight:600; color:var(--txt2); transition:color .18s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gb.active .gb-name { color:var(--lime); }
.gb-ods { font-family:var(--Jm); font-size:.52rem; color:var(--txt3); margin-top:2px; display:flex; align-items:center; gap:5px; }
.gb-ods-dot { width:5px; height:5px; border-radius:50%; background:var(--purp-b); flex-shrink:0; transition:all .2s; }
.gb.active .gb-ods-dot { background:var(--lime); box-shadow:0 0 5px var(--lime); }
.sb-div { height:1px; background:var(--bdr); margin:3px 13px; }

/* ══ MAIN ══ */
.main { grid-area:main; overflow:hidden; display:flex; flex-direction:column; padding:18px; position:relative; z-index:10; }
.mc { flex:1; min-height:0; background:var(--card); border:1px solid var(--bdr); border-radius:3px; display:flex; flex-direction:column; overflow:hidden; position:relative; backdrop-filter:blur(14px); }
.corner { position:absolute; width:14px; height:14px; border-style:solid; border-color:var(--lime); z-index:5; }
.c-tl { top:-1px; left:-1px; border-width:2px 0 0 2px; }
.c-tr { top:-1px; right:-1px; border-width:2px 2px 0 0; }
.c-bl { bottom:-1px; left:-1px; border-width:0 0 2px 2px; }
.c-br { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }
.mc-top { display:flex; align-items:center; gap:14px; padding:10px 18px; border-bottom:1px solid var(--bdr); background:rgba(124,58,237,.06); flex-shrink:0; }
.mc-id { font-family:var(--Or); font-size:.62rem; font-weight:500; letter-spacing:3px; color:var(--txt3); }
.mc-id em { color:var(--purp-hi); font-style:normal; }
.mc-top-right { display:flex; align-items:center; gap:8px; margin-left:auto; }
.pill { font-family:var(--Jm); font-size:.54rem; padding:2px 8px; border-radius:2px; letter-spacing:1px; }
.pill-on { background:rgba(132,204,22,.09); color:var(--lime-hi); border:1px solid var(--lime-b); }
/* QR button */
.btn-qr {
  font-family:var(--Jm); font-size:.54rem; letter-spacing:1.5px;
  padding:3px 9px; background:var(--org-d); color:var(--org-hi);
  border:1px solid var(--org-b); border-radius:2px;
  cursor:pointer; display:flex; align-items:center; gap:5px;
  transition:all .2s;
}
.btn-qr:hover { background:var(--org-b); }
.btn-qr svg { width:11px; height:11px; stroke:var(--org-hi); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
/* Card body */
.mc-body { flex:1; min-height:0; display:grid; grid-template-columns:1fr 230px; }
.mc-brief { padding:22px 24px; display:flex; flex-direction:column; gap:16px; overflow-y:auto; border-right:1px solid var(--bdr); }
.mc-brief::-webkit-scrollbar { width:3px; }
.mc-brief::-webkit-scrollbar-thumb { background:var(--purp-b); }
.mc-title { font-family:var(--Or); font-size:1.45rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--txt); line-height:1.2; }
.ods-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.ods-num { font-family:var(--Or); font-size:.6rem; font-weight:700; letter-spacing:2px; padding:3px 10px; background:var(--org-d); color:var(--org-hi); border:1px solid var(--org-b); border-radius:2px; }
.ods-name { font-family:var(--Jm); font-size:.6rem; color:var(--txt2); letter-spacing:1.5px; text-transform:uppercase; }
.mc-desc { font-family:var(--Ex); font-size:.8rem; color:var(--txt2); line-height:1.68; font-weight:300; max-width:600px; }
.sec-label { font-family:var(--Jm); font-size:.52rem; color:var(--txt3); letter-spacing:2px; margin-bottom:7px; }
.tags-row { display:flex; flex-wrap:wrap; gap:6px; }
.tag { font-family:var(--Jm); font-size:.54rem; padding:3px 8px; border-radius:2px; background:var(--purp-d); color:var(--purp-hi); border:1px solid var(--purp-b); letter-spacing:.5px; }
.manifest-row { display:flex; align-items:center; gap:8px; font-family:var(--Jm); font-size:.58rem; color:var(--txt3); padding-top:4px; }
.mf-file { color:var(--lime); }
/* Deploy panel */
.mc-deploy { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:24px 18px; background:rgba(124,58,237,.04); position:relative; }
.mc-deploy::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:repeating-linear-gradient(90deg,var(--org) 0,var(--org) 10px,transparent 10px,transparent 20px); opacity:.22; }
.deploy-title { font-family:var(--Or); font-size:.55rem; font-weight:500; letter-spacing:3px; text-transform:uppercase; color:var(--txt3); text-align:center; line-height:1.5; }
.sync-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
.sync-val { font-family:var(--Or); font-size:2.4rem; font-weight:700; color:var(--lime); line-height:1; animation:sFlick 6s ease-in-out infinite; text-shadow:0 0 20px rgba(132,204,22,.4); }
@keyframes sFlick { 0%,46%,54%,100%{opacity:1} 50%{opacity:.82} }
.sync-lbl { font-family:var(--Jm); font-size:.5rem; color:var(--txt3); letter-spacing:2.5px; }
.dep-div { width:75%; height:1px; background:linear-gradient(90deg,transparent,var(--purp-b),transparent); }
esp-web-install-button { --esp-tools-button-color:#7C3AED; --esp-tools-button-text-color:#EDE9F8; }
.magi-block { display:flex; flex-direction:column; align-items:center; gap:6px; }
.magi-dots { display:flex; gap:5px; }
.mdot { width:8px; height:8px; border-radius:1px; animation:mdP 1.4s ease-in-out infinite; }
.mdot-1 { background:var(--lime); box-shadow:0 0 5px var(--lime); animation-delay:0s; }
.mdot-2 { background:var(--purp-hi); box-shadow:0 0 5px var(--purp-hi); animation-delay:.47s; }
.mdot-3 { background:var(--org-hi); box-shadow:0 0 5px var(--org-hi); animation-delay:.93s; }
@keyframes mdP { 0%,100%{opacity:1} 50%{opacity:.25} }
.magi-txt { font-family:var(--Jm); font-size:.5rem; color:var(--txt3); letter-spacing:1.5px; }

/* ══ TERMINAL BAR ══ */
.tbar { grid-area:tbar; border-top:1px solid var(--bdr); background:rgba(3,0,8,.99); display:flex; align-items:center; padding:0 14px; gap:8px; font-family:var(--Jm); font-size:.57rem; color:var(--txt3); position:relative; z-index:50; }
.tbar::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,var(--purp-b),transparent); }
.tb-prompt { color:var(--lime); }
.tb-msg    { color:var(--txt2); }
.tb-cur    { width:5px; height:10px; background:var(--lime); animation:cur 1s step-end infinite; }
@keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }
.tb-right  { margin-left:auto; display:flex; align-items:center; gap:16px; }
.tb-stat   { display:flex; align-items:center; gap:5px; }
.tb-stat span:last-child { color:var(--txt2); }
.tb-magi   { font-family:var(--Jm); font-size:.54rem; color:var(--purp-hi); letter-spacing:1px; border-left:1px solid var(--bdr); padding-left:14px; opacity:.7; }

/* ══════════════════════════════════════════
   QR MODAL
══════════════════════════════════════════ */
.qr-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(3,0,8,.88);
  backdrop-filter:blur(10px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity .25s;
}
.qr-overlay.open { opacity:1; pointer-events:all; }
.qr-panel {
  background:rgba(10,3,26,.98);
  border:1px solid var(--purp-b);
  border-radius:4px;
  padding:28px 32px;
  display:flex; flex-direction:column; align-items:center; gap:18px;
  position:relative; max-width:320px; width:90%;
}
/* Corner brackets on modal */
.qr-panel .corner { border-color:var(--org); }
.qr-close {
  position:absolute; top:10px; right:12px;
  background:none; border:none; color:var(--txt3);
  font-family:var(--Jm); font-size:.65rem; cursor:pointer;
  letter-spacing:1px; transition:color .2s;
}
.qr-close:hover { color:var(--org-hi); }
.qr-header { text-align:center; }
.qr-super  { font-family:var(--Jm); font-size:.52rem; color:var(--txt3); letter-spacing:2px; margin-bottom:6px; }
.qr-name   { font-family:var(--Or); font-size:.95rem; font-weight:700; letter-spacing:1.5px; color:var(--lime); text-transform:uppercase; line-height:1.2; text-align:center; }
.qr-ods    { font-family:var(--Jm); font-size:.55rem; color:var(--org-hi); margin-top:4px; }
.qr-box {
  background:#ffffff; padding:10px; border-radius:3px;
  display:flex; align-items:center; justify-content:center;
}
.qr-url { font-family:var(--Jm); font-size:.55rem; color:var(--txt3); letter-spacing:.5px; text-align:center; line-height:1.6; }
.qr-url em { color:var(--lime); font-style:normal; }
.qr-actions { display:flex; gap:10px; }
.btn-qr-print {
  font-family:var(--Or); font-size:.55rem; font-weight:700;
  letter-spacing:2.5px; text-transform:uppercase;
  padding:7px 16px; background:transparent;
  color:var(--lime); border:1px solid var(--lime); border-radius:3px;
  cursor:pointer; transition:all .2s;
}
.btn-qr-print:hover { background:var(--lime); color:var(--bg); box-shadow:0 0 14px rgba(132,204,22,.3); }
.btn-qr-cancel {
  font-family:var(--Jm); font-size:.55rem; letter-spacing:2px;
  padding:7px 14px; background:transparent;
  color:var(--txt3); border:1px solid var(--bdr); border-radius:3px;
  cursor:pointer; transition:all .2s;
}
.btn-qr-cancel:hover { color:var(--txt2); border-color:var(--purp-b); }

/* ══ PRINT STYLES ══ */
@media print {
  body { display:block !important; background:#fff !important; }
  header, .sidebar, .tbar, .main, .qr-close, .qr-actions { display:none !important; }
  .qr-overlay { position:static !important; background:#fff !important; backdrop-filter:none !important; opacity:1 !important; }
  .qr-panel { border:none !important; background:#fff !important; color:#000 !important; }
  .qr-name, .qr-super, .qr-ods, .qr-url { color:#000 !important; }
  .qr-url em { color:#2d7d0a !important; }
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="logo-wrap">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <img src="logo.png" alt="I.T.S. Santa Rosa de Lima" class="logo-img">
  </div>
  <div class="hdr-text">
    <div class="hdr-brand">NERV · <em>STEAM</em> LAB</div>
    <span class="hdr-sub">I.T.S. SANTA ROSA DE LIMA — SISTEMA INTEGRADO DE FLASHEO ESP32</span>
  </div>
  <div class="nerv-badge">GEO-FRONT ACTIVADO</div>
  <div class="sys-col">
    <div class="sys-row">
      <div class="sys-item"><div class="dot dot-lime"></div><span>SISTEMA ACTIVO</span></div>
      <div class="sys-item"><div class="dot dot-purp"></div><span>WEB SERIAL OK</span></div>
    </div>
  </div>
  <!-- Music player con volumen — Phase 4 -->
  <div class="music-player">
    <button class="mbtn" id="musicBtn" title="Reproducir / Pausar">
      <svg id="icoPlay" viewBox="0 0 16 16"><path d="M4 2 14 8 4 14z"/></svg>
      <svg id="icoPause" viewBox="0 0 16 16" style="display:none">
        <rect x="3" y="2" width="3.5" height="12" rx="1"/>
        <rect x="9.5" y="2" width="3.5" height="12" rx="1"/>
      </svg>
    </button>
    <div class="waveform" id="waveform">
      <div class="wb" style="--d:.72s;--dl:0s;--h:14px;"></div>
      <div class="wb" style="--d:1.1s;--dl:.14s;--h:9px;"></div>
      <div class="wb" style="--d:.86s;--dl:.28s;--h:16px;"></div>
      <div class="wb" style="--d:.95s;--dl:.07s;--h:8px;"></div>
      <div class="wb" style="--d:1.25s;--dl:.38s;--h:13px;"></div>
      <div class="wb" style="--d:.78s;--dl:.2s;--h:15px;"></div>
    </div>
    <!-- Slider de volumen -->
    <div class="vol-wrap">
      <span class="vol-icon">
        <svg viewBox="0 0 16 16"><path d="M3 6H1v4h2l4 3V3L3 6zM11 8a3 3 0 00-2-2.8v5.6A3 3 0 0011 8z"/></svg>

<script>

/* ══════════════════════════════════════════════════════

const MISSIONS = [

    desc:"Monitor de compostaje con sensor DHT22 para temperatura y humedad en tiempo real. Controla un ventilador de aireacion mediante rele segun condiciones optimas del proceso biologico. Los datos se registran por monitor serie para analisis y seguimiento posterior.",

];

/* ══════════════════════════════════════════════════════
   WEB AUDIO API — tono de confirmacion NERV
══════════════════════════════════════════════════════ */
let audioCtx = null;
function playConfirmTone() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    // Acorde NERV: dos frecuencias en secuencia rapida
    [[440, 0, 0.09],[660, 0.1, 0.15]].forEach(([freq, start, dur]) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + start);
      gain.gain.setValueAtTime(0, t + start);
      gain.gain.linearRampToValueAtTime(0.18, t + start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t + start); osc.stop(t + start + dur + 0.01);
    });
  } catch(e) { /* silencioso si el navegador no soporta */ }
}

/* ══════════════════════════════════════════════════════
   URL PARAMS — seleccion automatica de grado
══════════════════════════════════════════════════════ */
function getGradeFromURL() {
  const p = new URLSearchParams(window.location.search);
  const g = parseInt(p.get('grado') || p.get('grade') || '0', 10);
  if (g >= 5 && g <= 11) {
    const idx = MISSIONS.findIndex(m => m.grade === g);
    if (idx >= 0) return idx;
  }
  return -1;
}

/* ══════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════ */
function buildSidebar() {
  const sb  = document.getElementById('sidebar');
  const lbl = sb.querySelector('.sb-label');
  let   html = '';
  MISSIONS.forEach((m, i) => {
    html += `<button class="gb" data-idx="${i}" onclick="selectMission(${i})">
      <span class="gb-num">${m.grade}°</span>
      <span class="gb-info">
        <span class="gb-name">${m.title}</span>
        <span class="gb-ods"><span class="gb-ods-dot"></span>${m.ods}</span>
      </span>
    </button>`;
    if (i < MISSIONS.length - 1) html += '<div class="sb-div"></div>';
  });
  lbl.insertAdjacentHTML('afterend', html);
}

/* ══════════════════════════════════════════════════════
   RENDER MISION
══════════════════════════════════════════════════════ */
function renderMission(m) {
  const main = document.getElementById('main');
  const tags = m.tags.map(t => `<span class="tag">${t}</span>`).join('');
  main.innerHTML = `
  <div class="mc">
    <div class="corner c-tl"></div><div class="corner c-tr"></div>
    <div class="corner c-bl"></div><div class="corner c-br"></div>
    <div class="mc-top">
      <span class="mc-id">MISION <em>${m.id}</em> // GRADO ${m.grade} // ${m.ods}</span>
      <div class="mc-top-right">
        <button class="btn-qr" onclick="openQR()">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="5" y="5" width="3" height="3"/><rect x="16" y="5" width="3" height="3"/><rect x="5" y="16" width="3" height="3"/><line x1="14" y1="14" x2="14" y2="14"/><line x1="17" y1="14" x2="21" y2="14"/><line x1="14" y1="17" x2="14" y2="21"/><line x1="17" y1="17" x2="21" y2="21"/><line x1="21" y1="17" x2="17" y2="21"/></svg>

/* ══════════════════════════════════════════════════════
   SELECCIONAR MISION
══════════════════════════════════════════════════════ */
let currentMission = null;

function selectMission(index) {
  const m = MISSIONS[index];
  currentMission = m;
  document.querySelectorAll('.gb').forEach((b, i) => b.classList.toggle('active', i === index));
  renderMission(m);
  // Actualizar manifest dinamicamente
  const btn = document.getElementById('flashBtn');
  if (btn) btn.setAttribute('manifest', m.manifest);
  // Tono de confirmacion
  playConfirmTone();
  // Terminal bar
  document.getElementById('tbMsg').textContent =
    `MISION ${m.id} CARGADA — ${m.title.toUpperCase()} [${m.ods}: ${m.odsName.toUpperCase()}]`;
  document.getElementById('tbGrade').textContent  = `${m.grade}° GRADO`;
  document.getElementById('tbStatus').textContent  = 'ACTIVO';
  document.getElementById('tbStatus').style.color  = 'var(--lime)';
  // Actualizar URL sin recargar
  const url = new URL(window.location.href);
  url.searchParams.set('grado', m.grade);
  window.history.replaceState({}, '', url);
}

/* ══════════════════════════════════════════════════════
   QR CODE MODAL
══════════════════════════════════════════════════════ */
let qrInstance = null;

function openQR() {
  if (!currentMission) return;
  const m    = currentMission;
  const url  = new URL(window.location.href);
  url.searchParams.set('grado', m.grade);
  const qrUrl = url.toString();

  document.getElementById('qrTitle').textContent = m.title.toUpperCase();
  document.getElementById('qrOds').textContent   = `${m.ods} — ${m.odsName}`;
  document.getElementById('qrUrlTxt').innerHTML  =
    `<em>${url.hostname}</em>${url.pathname}<br>?grado=${m.grade}`;

  // Limpiar QR anterior
  const canvas = document.getElementById('qrCanvas');
  canvas.innerHTML = '';
  if (qrInstance) { try { qrInstance.clear(); } catch(e){} }
  qrInstance = new QRCode(canvas, {
    text: qrUrl,
    width: 160, height: 160,
    colorDark: '#1a0a40',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  document.getElementById('qrOverlay').classList.add('open');
}

function closeQR() { document.getElementById('qrOverlay').classList.remove('open'); }

document.getElementById('qrClose').addEventListener('click', closeQR);
document.getElementById('qrCancel').addEventListener('click', closeQR);
document.getElementById('qrOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeQR();
});

/* ══════════════════════════════════════════════════════
   MUSIC PLAYER + VOLUMEN
══════════════════════════════════════════════════════ */
const audio     = document.getElementById('bgAudio');
const musicBtn  = document.getElementById('musicBtn');
const icoPlay   = document.getElementById('icoPlay');
const icoPause  = document.getElementById('icoPause');
const waveform  = document.getElementById('waveform');
const volSlider = document.getElementById('volSlider');
let playing = false;

audio.volume = 0.7;

musicBtn.addEventListener('click', () => {
  if (playing) {
    audio.pause();
    icoPlay.style.display = ''; icoPause.style.display = 'none';
    musicBtn.classList.remove('on'); waveform.classList.remove('on');
  } else {
    audio.play().catch(() => {});
    icoPlay.style.display = 'none'; icoPause.style.display = '';
    musicBtn.classList.add('on'); waveform.classList.add('on');
  }
  playing = !playing;
});

volSlider.addEventListener('input', function() {
  const v = this.value;
  audio.volume = v / 100;
  this.style.setProperty('--pct', v + '%');
});

/* ══════════════════════════════════════════════════════
   INICIALIZACION
══════════════════════════════════════════════════════ */
buildSidebar();
const urlIdx     = getGradeFromURL();
const defaultIdx = MISSIONS.findIndex(m => m.isDefault);
selectMission(urlIdx >= 0 ? urlIdx : (defaultIdx >= 0 ? defaultIdx : MISSIONS.length - 1));
</script>
