<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flasher 11° - I.T.S. Santa Rosa de Lima</title>
    
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
    
    <style>
        /* Diseño base moderno y animaciones */
        :root {
            --primary-color: #00ffcc;
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Animación del fondo */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Efecto Glassmorphism (Vidrio) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
            z-index: 10;
        }

        /* Estilos del Logo */
        .logo-colegio {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.5));
            transition: transform 0.3s ease;
        }
        
        .logo-colegio:hover {
            transform: scale(1.05);
        }

        h1 { margin: 0; font-size: 1.8rem; color: var(--primary-color); text-transform: uppercase; letter-spacing: 2px;}
        h2 { margin: 10px 0 30px; font-size: 1.2rem; font-weight: 300; color: #b3c6cb; }
        
        .badge {
            background: rgba(0, 255, 204, 0.2);
            color: var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid var(--primary-color);
        }

        /* Botón de música flotante */
        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--primary-color);
            color: white;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .music-btn:hover {
            background: var(--primary-color);
            color: black;
            box-shadow: 0 0 15px var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        
        <img src="logo.png" alt="INSTITUTO TECNICO EN SISTEMAS SANTA ROSA DE LIMA" class="logo-colegio">
        
        <div class="badge">Grado 11° - Robótica STEAM</div>
        
        <h1>Instalador de Firmware</h1>
        <h2>Proyecto: Carro 4WD WiFi</h2>

        <p style="font-size: 0.9rem; color: #a0aab0; margin-bottom: 30px;">
            Conecta el ESP32, haz clic en el botón de abajo y selecciona el puerto serial de tu placa.
        </p>

        <esp-web-install-button manifest="manifest.json"></esp-web-install-button>
    </div>

    <audio id="bg-audio" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <button class="music-btn" id="music-toggle" title="Reproducir/Pausar Música">
        🎵 Activar Audio
    </button>

    <script>
        // Lógica para el botón de música
        const audio = document.getElementById('bg-audio');
        const btn = document.getElementById('music-toggle');
        let isPlaying = false;

        btn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                btn.innerHTML = '🎵 Activar Audio';
            } else {
                audio.play();
                btn.innerHTML = '🔊 Pausar Audio';
            }
            isPlaying = !isPlaying;
        });
    </script>

</body>
</html>
